[tao]
# Web 服务监听端口
port=8023
# 登录有效期，单位天；如无需频繁重新登录，可保持较大值
expires=2
# 系统日志等级：0-DEBUG，1-INFO，2-WARNING，3-ERROR，4-CRITICAL；值越大日志越少，建议 1 或 2
log_level=1
# 控制台输出日志等级：适用于 0.2.3 及之后版本，规则同上
console_level=2
# 系统日志保留天数，超过该天数的日志会自动清理；0 表示不自动清理
log_save=7
# 任务记录保留天数，超过该天数的任务记录会自动清理；0 表示不自动清理
task_save=30
# 单个同步任务的超时时间，单位小时；建议保持较大值，避免大任务被误判超时
task_timeout=72
# 同时提交到 OpenList 的最大文件同步并发数；网络不稳定或远端性能一般时，建议 3-5
copy_parallel=5
# OpenList 请求连接超时，单位秒；适用于所有接口
openlist_connect_timeout=15
# OpenList 普通请求读取超时，单位秒；主要影响目录扫描、复制、建目录等接口
openlist_read_timeout=60
# 单个远端任务状态查询（copy/info）读取超时，单位秒
openlist_status_timeout=30
# 任务列表查询（copy/undone、copy/done）读取超时，单位秒；远端偶发抖动时建议适当调大
openlist_task_list_timeout=45
# 用户正在查看任务详情时的快速状态轮询间隔，单位秒；建议 2-5
status_query_fast_interval=3
# 无人查看任务详情时的后台轮询间隔，单位秒；建议大于快速轮询，以减少远端压力
status_query_slow_interval=20
# 目录扫描超时后的首次退避时间，单位秒；同一路径连续超时会按指数退避，避免反复请求慢目录
scan_retry_backoff_base=60
# 目录扫描退避时间上限，单位秒
scan_retry_backoff_max=1800
